server {
  listen 80;
  server_name erp.example.com;

  root /var/www/erp/frontend;
  index index.html;

  location /api/ {
    proxy_pass http://127.0.0.1:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://127.0.0.1:3000/uploads/;
    proxy_set_header Host $host;
  }

  # Một số trình duyệt hỏi /favicon.ico trước; nếu không có file, try_files ở / sẽ trả về
  # index.html (text/html) → icon tab bị hỏng. Trỏ tạm sang favicon.svg nếu chưa có .ico.
  location = /favicon.ico {
    try_files $uri /favicon.svg =404;
    default_type image/svg+xml;
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

